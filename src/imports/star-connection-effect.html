<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연결의 미학</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; } /* 검은 배경 */
        canvas { display: block; }
        #overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.8);
            font-family: 'Apple SD Gothic Neo', sans-serif;
            text-align: center; pointer-events: none; /* 클릭 방지 */
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-size:3rem; font-weight:100; letter-spacing:10px;">COMING SOON</h1>
        <p style="opacity:0.6;">마우스를 움직여 별들을 연결해 보세요.</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        // 마우스 포인터 상태
        let mouse = { x: null, y: null, radius: (canvas.height/80) * (canvas.width/80) };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // 입자 객체 생성
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            // 입자 그리기
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; // 흰색 입자
                ctx.fill();
            }
            // 입자 움직임 및 벽 튕기기
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                // 마우스 상호작용 (충돌 감지 및 밀어내기)
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius + this.size){
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 10;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 10;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 10;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 10;
                }
                // 일반 움직임
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        // 입자 배열 초기화
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000; // 밀도 조절
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1; // 1~3 크기
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5; // -0.5 ~ 0.5 속도
                let directionY = (Math.random() * 1) - 0.5;
                let color = 'white';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // 가까운 입자끼리 선 연결
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    // 연결 거리 설정 (값이 작을수록 선이 짧아짐)
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(150, 200, 255,' + opacityValue + ')'; // 연한 파란색 선
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight); // 화면 지우기
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // 창 크기 변경 대응
        window.addEventListener('resize', function(){
            canvas.width = innerWidth; canvas.height = innerHeight;
            mouse.radius = (canvas.height/80) * (canvas.width/80);
            init();
        });

        // 마우스가 화면을 벗어났을 때 초기화
        window.addEventListener('mouseout', function(){
            mouse.x = undefined; mouse.y = undefined;
        });

        init();
        animate();
    </script>
</body>
</html>
